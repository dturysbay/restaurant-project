<nav class="sticky top-0 z-40 bg-white shadow-sm border-b border-gray-100">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2">
      <span class="text-2xl">🍽️</span>
      <span class="font-bold text-xl text-brand-600">FoodHub</span>
    </a>

    <button
      (click)="openCart.emit()"
      class="relative flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-full font-medium transition-colors"
    >
      <span>🛒</span>
      <span>Cart</span>
      @if (cart.totalCount() > 0) {
        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
          {{ cart.totalCount() }}
        </span>
      }
    </button>
  </div>
</nav>
