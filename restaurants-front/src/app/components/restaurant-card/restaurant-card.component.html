<a [routerLink]="['/restaurant', restaurant().id]"
   class="block bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow overflow-hidden group cursor-pointer">
  <div class="relative h-48 overflow-hidden bg-gray-100">
    <img
      [src]="'assets/restaurants/' + restaurant().slug + '_cover.jpg'"
      [alt]="restaurant().name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
      loading="lazy"
    />
    <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-xs font-semibold px-2 py-1 rounded-full text-gray-700">
      {{ restaurant().cuisineTags }}
    </span>
  </div>

  <div class="p-4">
    <h3 class="font-bold text-lg text-gray-900 mb-1 line-clamp-1">{{ restaurant().name }}</h3>
    <p class="text-gray-400 text-xs mb-3">📍 {{ restaurant().address }}</p>

    <div class="flex items-center gap-4 text-sm text-gray-600">
      <span class="flex items-center gap-1">
        <span class="text-yellow-400">★</span>
        <span class="font-semibold text-gray-800">{{ restaurant().ratingScore }}</span>
      </span>
      <span>⏱ {{ restaurant().deliveryTimeMin }} min</span>
    </div>
  </div>
</a>
