<!-- Floating toggle button -->
<button
  (click)="toggle()"
  class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-brand-500 hover:bg-brand-600 text-white shadow-lg flex items-center justify-center text-2xl transition-all"
  [class.rotate-45]="isOpen()"
  title="AI Food Assistant"
>
  {{ isOpen() ? '✕' : '🤖' }}
</button>

<!-- Chat panel -->
@if (isOpen()) {
  <div class="fixed bottom-24 right-6 z-50 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-100" style="height: 480px;">
    <!-- Header -->
    <div class="bg-brand-500 text-white p-4 flex items-center gap-2">
      <span class="text-xl">🤖</span>
      <div>
        <p class="font-semibold leading-tight">AI Food Assistant</p>
        <p class="text-xs text-brand-100">Powered by Claude</p>
      </div>
    </div>

    <!-- Messages -->
    <div #messagesEl class="flex-1 overflow-y-auto p-4 space-y-3">
      @for (msg of messages(); track $index) {
        <div [class]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
          <div
            [class]="msg.role === 'user'
              ? 'bg-brand-500 text-white rounded-2xl rounded-tr-sm px-4 py-2 max-w-[80%] text-sm'
              : 'bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[85%] text-sm'"
          >
            {{ msg.content }}
          </div>
        </div>
      }

      @if (loading()) {
        <div class="flex justify-start">
          <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-4 py-3">
            <span class="flex gap-1">
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0s"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:.15s"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:.3s"></span>
            </span>
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="p-3 border-t flex gap-2">
      <input
        [(ngModel)]="input"
        (keydown)="onKeydown($event)"
        placeholder="Ask about restaurants or dishes…"
        class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
      />
      <button
        (click)="send()"
        [disabled]="loading()"
        class="w-10 h-10 rounded-full bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white flex items-center justify-center transition-colors"
      >➤</button>
    </div>
  </div>
}
